title: "Async for JS Developers ― 責務分解で理解する非同期処理"
summary: >
  Promise / await から一歩進み、
  非同期処理を「責務と実行モデルの地図」として理解するための本です。

  Stream / Socket / Event Loop / Task / Future を分解し、
  Node.js・ブラウザ・Rust・Python を同じ視点で読めるようにします。

  API の暗記ではなく、
  「誰が計算を持ち、誰が進め、誰が待ち、誰が責任を持つのか」
  を見分けられるようになることを目的としています。

topics:
  - javascript
  - async
  - eventloop
  - concurrency
  - nodejs

