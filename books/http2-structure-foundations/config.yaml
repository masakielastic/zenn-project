title: "HTTP/2入門 ― 構造とログで理解するプロトコル"
summary: |
  HTTP/2 は「速い HTTP」として語られがちですが、
  学び始めたときに本当に難しいのは速さそのものではありません。
  Connection / Stream / Frame の違いが曖昧だったり、
  ログを見ても何が起きているのか分からなかったり、
  gRPC や HTTP/3 とどうつながるのかが見えにくかったりします。

  本書は、HTTP/2 を仕様の暗記としてではなく、
  「観察できる構造と流れ」として理解するための入門書です。
  Connection / Stream / Frame という基本単位を整理し、
  HEADERS / DATA など代表的なフレームの役割を押さえながら、
  curl や nghttpd のログを手がかりに通信の流れを読めるようになることを目指します。

  HPACK やフロー制御は、入門として必要な位置づけに絞って扱い、
  実装の細部や RFC の網羅的な説明には踏み込みすぎません。
  まずは HTTP/2 を理解するための足場を作り、
  ログを見て通信の流れを言葉で説明できるようになることを重視します。
topics: ["http2"]
